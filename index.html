<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Best Momos in Kolkata | Momo Heaven</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
padding:15px 30px;
background:#000;
position:sticky;
top:0;
z-index:1000;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* HERO */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("images/steam-momo.jpg") center/cover no-repeat;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
color:#ddd;
}

.btn{
margin-top:20px;
padding:12px 25px;
background:#ff5722;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* CONTAINER */

.container{
padding:60px 20px;
max-width:1100px;
margin:auto;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
margin-top:30px;
}

/* CARD */

.card{
position:relative;
border-radius:12px;
overflow:hidden;
height:220px;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
transition:0.4s;
}

.card:hover img{
transform:scale(1.1);
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:15px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
}

.overlay h3{
margin:0;
color:#ff5722;
}

.overlay p{
margin:5px 0 0;
font-size:14px;
color:#ddd;
}

/* LOCATION */

.location{
text-align:center;
padding:60px 20px;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
background:#000;
}

</style>

</head>

<body>

<nav class="navbar">
<div><strong>Momo Heaven</strong></div>

<a href="#menu">Menu</a>

</div>
</nav>

</div>

</div>
</div>

</div>

<footer>
<p>Momo Heaven © 2026</p>
</footer>

</body>

</html>
